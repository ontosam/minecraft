name: Deploy to GitHub Pages

# Publishes the game to https://ontosam.github.io/minecraft/ on every push.
on:
  push:
    branches: ["claude/tender-mayer-550bb0"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enables Pages if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble the static site
        run: |
          mkdir -p _site
          cp -r index.html styles.css manifest.webmanifest sw.js js icons _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
